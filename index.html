<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Eventify | Professional Event Planning & Management</title>
    <meta name="title" content="Eventify | Professional Event Planning & Management" />
    <meta name="description" content="Eventify is your premium partner for planning unforgettable weddings, corporate events, and private parties. Crafting pure magic since day one." />
    <meta name="keywords" content="event planning, wedding planner, corporate events, party management, Eventify, event coordination" />
    <meta name="author" content="Eventify Team" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eventify-pro.vercel.app/" />
    <meta property="og:title" content="Eventify | Professional Event Planning & Management" />
    <meta property="og:description" content="Plan your dream event with Eventify. Professional management for weddings, corporate galas, and private celebrations." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://eventify-pro.vercel.app/" />
    <meta property="twitter:title" content="Eventify | Professional Event Planning & Management" />
    <meta property="twitter:description" content="Plan your dream event with Eventify. Professional management for weddings, corporate galas, and private celebrations." />
    <meta property="twitter:image" content="/og-image.jpg" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Eventify",
      "image": "https://eventify-pro.vercel.app/og-image.jpg",
      "@id": "https://eventify-pro.vercel.app/",
      "url": "https://eventify-pro.vercel.app/",
      "telephone": "+1234567890",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Main Event Street",
        "addressLocality": "London",
        "postalCode": "SW1A 1AA",
        "addressCountry": "UK"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 51.5074,
        "longitude": -0.1278
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday"
        ],
        "opens": "09:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://www.facebook.com/eventify",
        "https://www.twitter.com/eventify",
        "https://www.instagram.com/eventify"
      ]
    }
    </script>
  </head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
